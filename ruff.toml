target-version = "py312"
line-length = 100
src = ["src"]

[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "N",   # pep8-naming
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "SIM", # flake8-simplify
    "TCH", # flake8-type-checking
    "RUF", # ruff-specific
]
ignore = [
    "E501",   # line too long (handled by formatter)
    "B008",   # do not perform function calls in argument defaults (needed for DI)
    "TC001",  # Application imports needed at runtime for DI and Pydantic
    "TC003",  # Pydantic models need stdlib types at runtime (Path, datetime)
    "RUF001", # Chinese fullwidth punctuation is intentional in test strings
]

[lint.isort]
known-first-party = ["xspy"]

[format]
quote-style = "double"
indent-style = "space"
docstring-code-format = true
